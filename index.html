<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nash Collection Shianda | Live Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0c0f; color: #ecedee; }
    .header { background: linear-gradient(135deg, #0a2a5e, #1a4a7a); border-bottom: 3px solid #ffd966; padding: 18px 0; position: sticky; top: 0; z-index: 110; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
    .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .logo h1 { font-size: 1.9rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; display: inline-block; }
    .admin-dot { cursor: pointer; display: inline-block; background: #ffd966; color: #0a2a5e; width: 36px; height: 36px; font-size: 22px; text-align: center; line-height: 34px; border-radius: 50%; margin-left: 12px; transition: 0.3s; box-shadow: 0 0 12px #ffd966; vertical-align: middle; }
    .search-section { background: rgba(15,25,35,0.85); backdrop-filter: blur(12px); padding: 16px 0; position: sticky; top: 85px; z-index: 109; }
    .search-wrapper { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; justify-content: space-between; }
    .search-box { flex: 2; min-width: 240px; display: flex; background: rgba(0,0,0,0.4); border-radius: 60px; padding: 4px 8px 4px 22px; align-items: center; gap: 8px; border: 1px solid #ffd966aa; }
    .search-box input { flex: 1; background: transparent; border: none; padding: 12px 0; color: white; outline: none; }
    .search-box button { background: #ffd966; border: none; color: #0a2a5e; padding: 8px 24px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    .category-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
    .cat-filter { background: rgba(45,55,68,0.7); border: 1px solid #ffd966aa; padding: 8px 18px; border-radius: 40px; color: #f0e6d8; cursor: pointer; }
    .cat-filter.active, .cat-filter:hover { background: #ffd966; color: #0a2a5e; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin-top: 30px; padding-bottom: 40px; }
    .product-card { background: rgba(22,32,42,0.8); border-radius: 28px; overflow: hidden; border: 1px solid #ffd96655; padding: 18px; text-align: center; }
    .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; background: #2a3538; margin-bottom: 12px; }
    .product-title { font-weight: 800; font-size: 1.2rem; color: #ffd966; }
    .product-price { font-size: 1.4rem; font-weight: 800; margin: 8px 0; }
    .stock-status { font-size: 0.7rem; padding: 4px 12px; border-radius: 30px; display: inline-block; }
    .in-stock { background: #1f5530; color: #c7e9cf; }
    .low-stock { background: #a8611a; color: #ffe0b5; }
    .out-stock { background: #8b3c2a; color: #f0cfc2; }
    .contact-btn { background: #ffd966; color: #0a2a5e; border: none; padding: 10px; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    .admin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; display: none; justify-content: center; align-items: center; }
    .admin-box { background: #1a2228; border-radius: 44px; width: 90%; max-width: 550px; padding: 28px; border: 2px solid #ffd966; max-height: 85vh; overflow-y: auto; }
    .admin-box input, .admin-box select, .admin-box textarea { width: 100%; padding: 12px; margin: 8px 0 16px; background: #2b3538; border: 1px solid #ffd96688; border-radius: 40px; color: white; }
    .btn-primary { background: #ffd966; color: #0a2a5e; font-weight: bold; border: none; padding: 12px; border-radius: 60px; width: 100%; cursor: pointer; }
    .status-msg { margin-top: 10px; font-size: 12px; color: #ffd966; text-align: center; }
    footer { background: #030a0f; text-align: center; padding: 20px; border-top: 2px solid #ffd96644; color: #ffd966aa; margin-top: 30px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ffd966; color: #0a2a5e; padding: 10px 20px; border-radius: 60px; display: none; z-index: 2000; white-space: nowrap; }
    @media (max-width: 700px) { .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; } .product-img { height: 140px; } }
  </style>
</head>
<body>
<div class="header">
  <div class="container header-flex">
    <div class="logo">
      <h1>NASH COLLECTION SHIANDA<span class="admin-dot" id="adminDot">●</span></h1>
      <p>Premium Apparel • Mattresses • Footwear • Accessories</p>
    </div>
  </div>
</div>

<div class="search-section">
  <div class="container search-wrapper">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search products...">
      <button id="searchBtn">Find</button>
    </div>
    <div class="category-buttons" id="categoryFilters">
      <button class="cat-filter active" data-cat="all">All</button>
      <button class="cat-filter" data-cat="Clothes">👕 Clothes</button>
      <button class="cat-filter" data-cat="T-Shirts">👕 T-Shirts</button>
      <button class="cat-filter" data-cat="Shirts">👔 Shirts</button>
      <button class="cat-filter" data-cat="Trousers">👖 Trousers</button>
      <button class="cat-filter" data-cat="Shoes">👟 Shoes</button>
      <button class="cat-filter" data-cat="Mattresses">🛏️ Mattresses</button>
      <button class="cat-filter" data-cat="Hats">🧢 Hats</button>
      <button class="cat-filter" data-cat="Belts">⛓️ Belts</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="products-grid" id="productsGrid"><div style="text-align:center;">🌀 Loading products...</div></div>
</div>

<footer>
  <p>Nash Collection Shianda | 0725980427 | kitonganashon@gmail.com</p>
  <p>✨ Admin updates appear instantly for all visitors</p>
</footer>

<div id="adminOverlay" class="admin-overlay">
  <div class="admin-box">
    <span style="float:right; font-size:28px; cursor:pointer;" id="closeAdminBtn">&times;</span>
    <div id="loginSection">
      <h2>Admin Access</h2>
      <input type="password" id="adminPassInput" placeholder="Password">
      <button id="loginAdminBtn" class="btn-primary">Unlock</button>
    </div>
    <div id="dashboardSection" style="display:none;">
      <h2>Add Product</h2>
      <input type="text" id="prodName" placeholder="Product name">
      <select id="prodCategory">
        <option>Clothes</option><option>T-Shirts</option><option>Shirts</option><option>Trousers</option>
        <option>Shoes</option><option>Mattresses</option><option>Hats</option><option>Belts</option>
      </select>
      <input type="number" id="prodPrice" placeholder="Price (KES)">
      <input type="number" id="prodStock" placeholder="Stock">
      <textarea id="prodDesc" rows="2" placeholder="Description"></textarea>
      <input type="file" id="prodImage" accept="image/*">
      <button id="addProductBtn" class="btn-primary">Publish Product</button>
      <div id="uploadStatus" class="status-msg"></div>
      <div id="adminProductsList" style="margin-top:20px;"></div>
      <button id="changeAdminPassBtn" style="margin-top:16px; background:#9b7b55;" class="btn-primary">Change Password</button>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB_cAjquKbtEcqcfdHiby9OIGTFwt2WFls",
    authDomain: "madip-fac8f.firebaseapp.com",
    projectId: "madip-fac8f"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const SUPABASE_URL = 'https://gemqyglwfovgtmglritr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlbXF5Z2x3Zm92Z3RtZ2xyaXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODQwNTcsImV4cCI6MjA5MjA2MDA1N30.7cXKw_LpGa_WDQN6Dugu9ku6wdaqVz2NBSp7-cYaCkY';
  const SUPABASE_BUCKET = 'product-images';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const adminOverlay = document.getElementById('adminOverlay');
  const adminDot = document.getElementById('adminDot');
  const closeAdminBtn = document.getElementById('closeAdminBtn');
  const loginSection = document.getElementById('loginSection');
  const dashboardSection = document.getElementById('dashboardSection');
  const loginAdminBtn = document.getElementById('loginAdminBtn');
  const adminPassInput = document.getElementById('adminPassInput');
  const addProductBtn = document.getElementById('addProductBtn');
  const changeAdminPassBtn = document.getElementById('changeAdminPassBtn');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const productsGrid = document.getElementById('productsGrid');
  const uploadStatus = document.getElementById('uploadStatus');

  let currentCategory = "all";
  let currentSearch = "";
  let allProducts = [];

  function showToast(msg, isErr = false) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.style.background = isErr ? "#bc4e2c" : "#ffd966";
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
  }

  let dotCount = 0, dotTimer;
  adminDot.addEventListener('click', () => {
    dotCount++;
    clearTimeout(dotTimer);
    dotTimer = setTimeout(() => dotCount = 0, 800);
    if (dotCount === 5) {
      dotCount = 0;
      adminOverlay.style.display = "flex";
      loginSection.style.display = "block";
      dashboardSection.style.display = "none";
      adminPassInput.value = "";
    } else {
      adminDot.style.transform = "scale(1.2)";
      setTimeout(() => adminDot.style.transform = "", 150);
    }
  });
  closeAdminBtn.addEventListener('click', () => adminOverlay.style.display = "none");

  async function getStoredPassword() {
    const doc = await db.collection("settings").doc("admin").get();
    return doc.exists && doc.data().password ? doc.data().password : "NashAdmin2025!";
  }

  loginAdminBtn.addEventListener('click', async () => {
    const entered = adminPassInput.value;
    const saved = await getStoredPassword();
    if (entered === saved) {
      loginSection.style.display = "none";
      dashboardSection.style.display = "block";
      showToast("Admin access granted");
      loadAdminProducts();
    } else {
      alert("Wrong password! Default: NashAdmin2025!");
    }
  });

  changeAdminPassBtn.addEventListener('click', async () => {
    const newPass = prompt("New password (min 4 chars):");
    if (newPass && newPass.length >= 4) {
      await db.collection("settings").doc("admin").set({ password: newPass });
      showToast("Password updated");
    }
  });

  db.collection("products").orderBy("timestamp", "desc").onSnapshot((snap) => {
    allProducts = snap.docs;
    renderProducts();
    if (dashboardSection.style.display === "block") loadAdminProducts();
  });

  function renderProducts() {
    let filtered = [...allProducts];
    if (currentCategory !== "all") filtered = filtered.filter(d => d.data().category === currentCategory);
    if (currentSearch.trim()) {
      const q = currentSearch.toLowerCase();
      filtered = filtered.filter(d => d.data().name.toLowerCase().includes(q));
    }
    if (filtered.length === 0) {
      productsGrid.innerHTML = "<div style='text-align:center; grid-column:span 4;'>✨ No products yet — admin can add</div>";
      return;
    }
    productsGrid.innerHTML = filtered.map(doc => {
      const p = doc.data();
      let stockClass = "in-stock", stockText = "In stock";
      if (p.stock <= 0) { stockClass = "out-stock"; stockText = "Out of stock"; }
      else if (p.stock < 5) { stockClass = "low-stock"; stockText = `Only ${p.stock} left`; }
      const imgUrl = p.imageUrl && p.imageUrl.startsWith('http') ? p.imageUrl : "https://via.placeholder.com/300x200?text=Nash";
      return `
        <div class="product-card">
          <img class="product-img" src="${imgUrl}" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Error'">
          <div class="product-title">${escapeHtml(p.name)}</div>
          <div class="product-price">KSh ${Number(p.price).toLocaleString()}</div>
          <span class="stock-status ${stockClass}">${stockText}</span>
          <p>${escapeHtml(p.description || '')}</p>
          <button class="contact-btn" data-name="${escapeHtml(p.name)}">Inquire</button>
        </div>
      `;
    }).join("");
    document.querySelectorAll(".contact-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const name = btn.getAttribute("data-name");
        window.location.href = `mailto:kitonganashon@gmail.com?subject=Order: ${name}`;
      });
    });
  }

  function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || ""; }

  async function loadAdminProducts() {
    const container = document.getElementById("adminProductsList");
    if (!container) return;
    if (allProducts.length === 0) { container.innerHTML = "<p>No products yet</p>"; return; }
    container.innerHTML = allProducts.map(doc => {
      const p = doc.data();
      return `
        <div style="background:#2b3336; padding:12px; border-radius:24px; margin-bottom:12px; display:flex; justify-content:space-between;">
          <div><strong>${escapeHtml(p.name)}</strong><br>KSh ${p.price} | Stock: ${p.stock}</div>
          <div>
            <button onclick="deleteProduct('${doc.id}')" style="background:#bc4e2c; color:white; border:none; border-radius:30px; padding:6px 12px;">Delete</button>
            <button onclick="editStock('${doc.id}', ${p.stock})" style="background:#ffd966; color:#0a2a5e; border:none; border-radius:30px; padding:6px 12px; margin-left:6px;">Edit Stock</button>
          </div>
        </div>
      `;
    }).join("");
  }

  window.deleteProduct = async (id) => {
    if (confirm("Delete product?")) { await db.collection("products").doc(id).delete(); showToast("Deleted"); }
  };
  window.editStock = async (id, current) => {
    let newVal = prompt("New stock:", current);
    if (newVal !== null && !isNaN(parseInt(newVal))) {
      await db.collection("products").doc(id).update({ stock: parseInt(newVal) });
      showToast("Stock updated");
    }
  };

  addProductBtn.addEventListener('click', async () => {
    const name = document.getElementById('prodName').value.trim();
    const category = document.getElementById('prodCategory').value;
    const price = parseFloat(document.getElementById('prodPrice').value);
    const stock = parseInt(document.getElementById('prodStock').value);
    const desc = document.getElementById('prodDesc').value.trim();
    const imageFile = document.getElementById('prodImage').files[0];

    if (!name || isNaN(price) || isNaN(stock)) {
      alert("Fill name, price, stock");
      return;
    }

    uploadStatus.innerText = "Uploading image...";
    let imageUrl = "https://via.placeholder.com/300x200?text=Nash";

    if (imageFile) {
      try {
        const fileExt = imageFile.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 8)}.${fileExt}`;
        
        const { error } = await supabaseClient.storage
          .from(SUPABASE_BUCKET)
          .upload(fileName, imageFile, { cacheControl: '3600', upsert: false });
        
        if (error) throw error;
        
        const { data: urlData } = supabaseClient.storage
          .from(SUPABASE_BUCKET)
          .getPublicUrl(fileName);
        
        imageUrl = urlData.publicUrl;
        uploadStatus.innerText = "✅ Image uploaded!";
        showToast("Image uploaded");
      } catch (err) {
        console.error(err);
        uploadStatus.innerText = "⚠️ Upload failed, using placeholder";
        showToast("Upload error: " + err.message, true);
      }
    } else {
      uploadStatus.innerText = "No image selected";
    }

    try {
      await db.collection("products").add({
        name, category, price, stock, description: desc,
        imageUrl,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast(`✅ ${name} added!`);
      document.getElementById('prodName').value = "";
      document.getElementById('prodPrice').value = "";
      document.getElementById('prodStock').value = "";
      document.getElementById('prodDesc').value = "";
      document.getElementById('prodImage').value = "";
      uploadStatus.innerText = "";
    } catch (err) {
      alert("Firestore error: " + err.message);
    }
  });

  document.querySelectorAll(".cat-filter").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-filter").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentCategory = btn.getAttribute("data-cat");
      renderProducts();
    });
  });
  searchBtn.addEventListener("click", () => { currentSearch = searchInput.value.trim(); renderProducts(); });
  searchInput.addEventListener("keyup", (e) => { if (e.key === "Enter") { currentSearch = searchInput.value.trim(); renderProducts(); } });
</script>
</body>
        </html>
